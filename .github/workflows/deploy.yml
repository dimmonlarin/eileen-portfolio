name: Deploy to Vercel

# Triggers a Vercel deploy on every push to main by calling a Deploy Hook.
# Deploy-hook deployments are not tied to a Git author, so they bypass
# Vercel's "unauthorized author" block on the free Hobby plan — letting
# collaborators (e.g. Eileen) publish to the live site on a private repo.

on:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: vercel-deploy
  cancel-in-progress: false

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Vercel Deploy Hook
        env:
          HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL secret is not set yet — skipping deploy."
            echo "Add it under: repo Settings -> Secrets and variables -> Actions."
            exit 0
          fi
          echo "Calling Vercel Deploy Hook..."
          curl -fsS -X POST "$HOOK_URL" -o /dev/null -w "HTTP %{http_code}\n"
          echo "Deploy triggered. Watch progress in the Vercel dashboard."
